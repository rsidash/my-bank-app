services:

  # Infrastructure
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_HTTP_PORT: 8180
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8180 && echo -e 'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3"]
      interval: 10s
      timeout: 5s
      retries: 10

  accounts-db:
    image: postgres:17
    environment:
      POSTGRES_DB: accounts_db
      POSTGRES_USER: accounts
      POSTGRES_PASSWORD: accounts_password
    ports:
      - "5432:5432"
    volumes:
      - accounts-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounts -d accounts_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Service Discovery
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Config Server
  config-server:
    build: ./config-server
    ports:
      - "8888:8888"
    environment:
      KEYCLOAK_CLIENT_SECRET: my-bank-front-secret
      ACCOUNTS_CLIENT_SECRET: accounts-service-secret
      ACCOUNTS_DB_PASSWORD: accounts_password
      CASH_CLIENT_SECRET: cash-service-secret
      TRANSFER_CLIENT_SECRET: transfer-service-secret
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    volumes:
      - ./config-repo:/app/config-repo
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # API Gateway
  gateway:
    build: ./gateway
    ports:
      - "8090:8090"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # Microservices
  accounts-service:
    build: ./accounts-service
    ports:
      - "8081:8081"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://accounts-db:5432/accounts_db
    depends_on:
      config-server:
        condition: service_healthy
      accounts-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  cash-service:
    build: ./cash-service
    ports:
      - "8082:8082"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  notifications-service:
    build: ./notifications-service
    ports:
      - "8083:8083"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  transfer-service:
    build: ./transfer-service
    ports:
      - "8084:8084"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # Frontend
  front-app:
    build: ./front-app
    ports:
      - "8080:8080"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  accounts-data:
