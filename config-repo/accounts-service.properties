# Accounts Service settings
server.port=8081

# Service URLs (for direct calls, used in Kubernetes; default via gateway for dev)
notifications.service.url=http://localhost:8090/api/notifications

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/accounts_db
spring.datasource.username=accounts
spring.datasource.password=${ACCOUNTS_DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.sql.init.mode=always

# OAuth2 Resource Server - validate incoming JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/my-bank

# OAuth2 Client - Client Credentials Flow for calling Notifications
spring.security.oauth2.client.registration.notifications.client-id=accounts-service
spring.security.oauth2.client.registration.notifications.client-secret=${ACCOUNTS_CLIENT_SECRET}
spring.security.oauth2.client.registration.notifications.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.notifications.scope=notifications
spring.security.oauth2.client.provider.notifications.issuer-uri=http://localhost:8180/realms/my-bank
