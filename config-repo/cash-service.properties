# Cash Service settings
server.port=8082

# Service URLs (direct calls in Kubernetes; via gateway for dev)
accounts.service.url=http://localhost:8090/api/accounts

# OAuth2 Resource Server - validate incoming JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/my-bank

# OAuth2 Client - Client Credentials Flow for calling Accounts
spring.security.oauth2.client.registration.accounts.client-id=cash-service
spring.security.oauth2.client.registration.accounts.client-secret=${CASH_CLIENT_SECRET}
spring.security.oauth2.client.registration.accounts.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.accounts.scope=accounts
spring.security.oauth2.client.provider.accounts.issuer-uri=http://localhost:8180/realms/my-bank

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
