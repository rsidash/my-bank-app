# Transfer Service settings
server.port=8084

# Gateway URL
gateway.url=http://localhost:8090

# OAuth2 Resource Server - validate incoming JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/my-bank

# OAuth2 Client - Client Credentials Flow for calling Accounts
spring.security.oauth2.client.registration.accounts.client-id=transfer-service
spring.security.oauth2.client.registration.accounts.client-secret=${TRANSFER_CLIENT_SECRET}
spring.security.oauth2.client.registration.accounts.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.accounts.scope=accounts
spring.security.oauth2.client.provider.accounts.issuer-uri=http://localhost:8180/realms/my-bank

# OAuth2 Client - Client Credentials Flow for calling Notifications
spring.security.oauth2.client.registration.notifications.client-id=transfer-service
spring.security.oauth2.client.registration.notifications.client-secret=${TRANSFER_CLIENT_SECRET}
spring.security.oauth2.client.registration.notifications.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.notifications.scope=notifications
spring.security.oauth2.client.provider.notifications.issuer-uri=http://localhost:8180/realms/my-bank
