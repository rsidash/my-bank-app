# Shared settings for all microservices

# OAuth2 Provider (Keycloak)
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8180/realms/my-bank

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Default service URLs (via gateway for dev mode)
accounts.service.url=http://localhost:8090/api/accounts
cash.service.url=http://localhost:8090/api/cash
transfer.service.url=http://localhost:8090/api/transfer

# Observability
management.endpoints.web.exposure.include=health,prometheus,info
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logstash.host=localhost
logstash.port=5044
