# Front App settings
server.port=8080

# Service URLs (direct calls in Kubernetes; via gateway for dev)
accounts.service.url=http://localhost:8090/api/accounts
cash.service.url=http://localhost:8090/api/cash
transfer.service.url=http://localhost:8090/api/transfer

# OAuth2 Client Registration (Authorization Code Flow)
spring.security.oauth2.client.registration.keycloak.client-id=my-bank-front
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
