# Shared settings for all microservices (Docker environment)

# OAuth2 Provider (Keycloak)
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://keycloak:8180/realms/my-bank

# Eureka Client
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

# Service URLs via gateway (Docker mode)
accounts.service.url=http://gateway:8090/api/accounts
cash.service.url=http://gateway:8090/api/cash
transfer.service.url=http://gateway:8090/api/transfer
notifications.service.url=http://gateway:8090/api/notifications
