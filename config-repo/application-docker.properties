# Shared settings for all microservices (Docker environment)

# OAuth2 Provider (Keycloak) - accessible from both containers and browser
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://keycloak:8180/realms/my-bank

# Eureka Client (overridden via env vars in docker-compose, this is fallback)
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
