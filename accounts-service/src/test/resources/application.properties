spring.application.name=accounts-service

# H2 in-memory for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never

# Disable Eureka and Config Server in tests
eureka.client.enabled=false
spring.cloud.config.enabled=false

# Disable OAuth2 client (no client registrations in tests)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# Service URLs for tests
notifications.service.url=http://localhost:8083
