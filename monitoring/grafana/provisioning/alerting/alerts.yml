apiVersion: 1

groups:
  - orgId: 1
    name: my-bank-alerts
    folder: alerts
    interval: 1m
    rules:
      - uid: high-error-rate
        title: High 5xx Error Rate
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) / sum(rate(http_server_requests_seconds_count[5m]))
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0.05]
        for: 1m
        annotations:
          summary: "More than 5% of requests are failing with 5xx errors"
