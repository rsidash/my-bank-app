apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-cash-service
  labels:
    app: cash-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: cash-service
  template:
    metadata:
      labels:
        app: cash-service
    spec:
      containers:
        - name: cash-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-cash-service-config
            - secretRef:
                name: {{ .Release.Name }}-cash-service-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30
