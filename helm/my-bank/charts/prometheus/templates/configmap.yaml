apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
      - job_name: 'accounts-service'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['{{ .Release.Name }}-accounts-service:8081']
      - job_name: 'cash-service'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['{{ .Release.Name }}-cash-service:8082']
      - job_name: 'transfer-service'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['{{ .Release.Name }}-transfer-service:8084']
      - job_name: 'notifications-service'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['{{ .Release.Name }}-notifications-service:8083']
      - job_name: 'front-app'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['{{ .Release.Name }}-front-app:8080']
  alerts.yml: |
    groups:
      - name: my-bank-alerts
        rules:
          - alert: HighErrorRate
            expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "High 5xx error rate (>5%)"
          - alert: HighLatency
            expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le)) > 2
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "p95 latency above 2 seconds"
          - alert: ServiceDown
            expr: up == 0
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
          - alert: HighJvmMemoryUsage
            expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.9
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "JVM heap usage above 90%"
