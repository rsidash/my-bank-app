apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-db"
  labels:
    app: my-bank-test
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: test-postgres
      image: postgres:17-alpine
      env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-accounts-db-secret
              key: password
      command: ['sh', '-c']
      args:
        - |
          echo "Testing PostgreSQL connection..."
          pg_isready -h {{ .Release.Name }}-accounts-db -U accounts -d accounts_db || exit 1
          echo "PostgreSQL is ready!"
  restartPolicy: Never
