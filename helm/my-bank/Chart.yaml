    version: "0.1.0"
    repository: "file://charts/zipkin"
  - name: prometheus
    version: "0.1.0"
    repository: "file://charts/prometheus"
  - name: grafana
    version: "0.1.0"
    repository: "file://charts/grafana"
  - name: elasticsearch
    version: "0.1.0"
