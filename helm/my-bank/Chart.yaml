apiVersion: v2
name: my-bank
description: My Bank - Microservices application deployed on Kubernetes
type: application
version: 0.1.0
appVersion: "0.0.1"

dependencies:
  - name: accounts-db
    version: "0.1.0"
    repository: "file://charts/accounts-db"
  - name: kafka
    version: "0.1.0"
    repository: "file://charts/kafka"
  - name: keycloak
    version: "0.1.0"
    repository: "file://charts/keycloak"
  - name: accounts-service
    version: "0.1.0"
    repository: "file://charts/accounts-service"
  - name: cash-service
    version: "0.1.0"
